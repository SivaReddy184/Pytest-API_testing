[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Smoke tests (quick sanity checks)
    regression: Full regression suite
    products: Tests related to products APIs
    brands: Tests related to brands APIs
    search: Tests related to search APIs
    auth: Tests related to login/authentication APIs
    user: Tests related to user account APIs
    negative: Negative test cases
    positive: Positive test cases

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# HTML Report (default)
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
